# Builds docs from main (as /latest) and from every version tag on each trigger,
# deploying the combined output to GitHub Pages in one shot.

name: Update docs with mdBook

on:
  push:
    branches: ['main']
    paths:
      - 'docs/**'
      - '.github/workflows/mdbook.yml'
    tags:
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs so
# production deployments are always allowed to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'roostorg/coop' }}
    env:
      MDBOOK_VERSION: 0.5.2
    steps:
      # fetch-depth: 0 is required to access all tags for versioned builds
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Cache mdBook binary
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: mdbook-bin
          key: mdbook-${{ env.MDBOOK_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install mdBook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          ARCH="x86_64-unknown-linux-gnu"
          ARCHIVE="mdbook-v${MDBOOK_VERSION}-${ARCH}.tar.gz"
          URL="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/${ARCHIVE}"
          mkdir --parents mdbook-bin
          curl --silent --show-error --location --output mdbook.tar.gz "$URL"
          tar --extract --gzip --file mdbook.tar.gz --directory mdbook-bin
          rm mdbook.tar.gz

      - name: Build docs
        run: |
          MDBOOK="${{ github.workspace }}/mdbook-bin/mdbook"
          SITE="${{ github.workspace }}/_site"
          mkdir --parents "$SITE"

          "$MDBOOK" build docs --dest-dir "$SITE/latest"

          for tag in $(git tag --list '[0-9]*' | sort --version-sort); do
            git worktree add "_worktree_${tag}" "$tag"
            "$MDBOOK" build "_worktree_${tag}/docs" --dest-dir "$SITE/$tag"
            git worktree remove "_worktree_${tag}"
          done

          {
            printf '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
            printf '  <meta charset="UTF-8">\n'
            printf '  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
            printf '  <title>Coop Documentation</title>\n'
            printf '</head>\n<body>\n<h1>Coop Documentation</h1>\n<ul>\n'
            printf '  <li><a href="latest/">Latest</a></li>\n'
            for tag in $(git tag --list '[0-9]*' | sort --version-sort --reverse); do
              printf '  <li><a href="%s/">%s</a></li>\n' "$tag" "$tag"
            done
            printf '</ul>\n</body>\n</html>\n'
          } > "$SITE/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
