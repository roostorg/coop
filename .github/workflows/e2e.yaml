name: E2E

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Only run the (heavy) E2E job when something that can affect the running app
  # changed.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            app:
              - 'server/**'
              - 'client/**'
              - 'db/**'
              - '.github/workflows/e2e.yaml'
              # Root-level files the workflow steps below depend on.
              - '.nvmrc'
              - 'package.json'
              - 'package-lock.json'
              - 'docker-compose.yaml'

  e2e:
    needs: [changes]
    if: ${{ needs.changes.outputs.run == 'true' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Configure Docker Hub mirror
        # Route docker.io pulls through Google's pull-through cache to avoid
        # transient Docker Hub registry/auth timeouts.
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Pre-pull images (with retry)
        run: |
          for attempt in 1 2 3; do
            if docker compose pull --quiet postgres scylla clickhouse redis; then exit 0; fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::image prep attempt $attempt failed; retrying in $((attempt * 15))s"
              sleep $((attempt * 15))
            fi
          done
          echo "::error::image prep failed after 3 attempts"; exit 1

      - name: Start backing services
        run: docker compose up --detach --quiet-pull postgres clickhouse scylla redis

      - name: Configure env
        run: |
          cp server/.env.example server/.env
          cp db/.env.example db/.env
          cp client/.env.example client/.env

      - name: Install dependencies
        run: |
          npm ci
          (cd server && npm ci)
          (cd client && npm ci)
          (cd db && npm ci)

      - name: Create databases
        run: |
          npm run db:create -- --env staging --db api-server-pg
          npm run db:create -- --env staging --db scylla
          npm run db:create -- --env staging --db clickhouse

      - name: Run migrations
        run: |
          npm run db:update -- --env staging --db api-server-pg
          npm run db:update -- --env staging --db scylla
          npm run db:update -- --env staging --db clickhouse

      - name: Start server and client
        # Redirect output to files so the backgrounded processes don't hold this
        # step's stdout pipe open (which would hang the step).
        run: |
          npm run server:start > /tmp/server.log 2>&1 &
          (cd client && npm start) > /tmp/client.log 2>&1 &
          # Wait (up to 120s) for the API (tcp 8080) and client (http 3000) to be
          # ready. A built-in shell loop avoids fetching an undeclared dependency
          # at runtime, which would bypass the committed lockfile.
          deadline=$((SECONDS + 120))
          until (exec 3<>/dev/tcp/127.0.0.1/8080) 2>/dev/null \
            && curl -sf -o /dev/null http://localhost:3000; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::group::server.log"; cat /tmp/server.log; echo "::endgroup::"
              echo "::group::client.log"; cat /tmp/client.log; echo "::endgroup::"
              echo "::error::server (8080) / client (3000) not ready within 120s"
              exit 1
            fi
            sleep 2
          done

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('server/package-lock.json') }}

      - name: Install Playwright system dependencies
        # OS-level deps live outside the cached browser dir, so install them every run.
        run: cd server && npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd server && npx playwright install chromium

      - name: Run E2E suite
        run: cd server && npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: playwright-report
          path: server/e2e/playwright-report/
          retention-days: 14
