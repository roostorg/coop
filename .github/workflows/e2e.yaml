# DRAFT — needs human review before it can be relied on (per AGENTS.md, workflow
# files require maintainer approval). End-to-end (Playwright) suite for the
# moderator-critical dashboard flows (#485).
#
# Runs on PRs and on pushes to main. It boots the full stack
# (Postgres/ClickHouse/Scylla/Redis + server + client), so it is slower /
# heavier than the other per-PR checks.
#
# The app bring-up below mirrors the documented local setup in AGENTS.md. It has
# not yet been validated end-to-end in CI; expect to iterate on service
# readiness waits and env once real specs exist.
name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Only run the (heavy) E2E job when something that can affect the running app
  # changed. Mirrors the `changes` gate in apply_pr_checks.yaml.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            app:
              - 'server/**'
              - 'client/**'
              - 'db/**'
              - 'e2e/**'
              - '.github/workflows/e2e.yaml'

  e2e:
    needs: [changes]
    if: ${{ needs.changes.outputs.run == 'true' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Start backing services
        run: docker compose up --detach postgres clickhouse scylla redis

      - name: Configure env
        run: |
          cp server/.env.example server/.env
          cp db/.env.example db/.env
          cp client/.env.example client/.env

      - name: Install dependencies
        run: |
          npm ci
          (cd server && npm ci)
          (cd client && npm ci)
          (cd db && npm ci)

      - name: Create databases
        run: |
          npm run db:create -- --env staging --db api-server-pg
          npm run db:create -- --env staging --db scylla
          npm run db:create -- --env staging --db clickhouse

      - name: Run migrations
        run: |
          npm run db:update -- --env staging --db api-server-pg
          npm run db:update -- --env staging --db scylla
          npm run db:update -- --env staging --db clickhouse

      - name: Seed organization and admin user
        run: |
          npm run create-org -- \
            --name "E2E Org" \
            --email "${{ env.E2E_EMAIL }}" \
            --website "https://example.com" \
            --firstName "E2E" \
            --lastName "Admin" \
            --password "${{ env.E2E_PASSWORD }}"
        env:
          # Test-only credentials for an ephemeral CI database. Override via repo
          # secrets if you prefer not to keep them in the workflow.
          E2E_EMAIL: e2e@example.com
          E2E_PASSWORD: e2e-password-CHANGE-ME

      - name: Start server and client
        # Redirect output to files so the backgrounded processes don't hold this
        # step's stdout pipe open (which would hang the step). They keep running
        # into the later steps. Wait on the server's TCP port (it only logs
        # "Server is running" after all middleware, incl. GraphQL, is wired) plus
        # the client's HTTP 200. The /ready endpoint is unusable here: it 500s
        # when CPU > 75%, which is always true while tsc-watch + vite compile.
        run: |
          npm run server:start > /tmp/server.log 2>&1 &
          (cd client && npm start) > /tmp/client.log 2>&1 &
          npx --yes wait-on@8 tcp:127.0.0.1:8080 http://localhost:3000 --timeout 120000 \
            || { echo "::group::server.log"; cat /tmp/server.log; echo "::endgroup::"; \
                 echo "::group::client.log"; cat /tmp/client.log; echo "::endgroup::"; exit 1; }

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright system dependencies
        # OS-level deps live outside the cached browser dir, so install them every run.
        run: cd e2e && npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd e2e && npx playwright install chromium

      - name: Run E2E suite
        run: cd e2e && npm test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # Surface the seeded credentials to specs/fixtures that perform login.
          E2E_EMAIL: e2e@example.com
          E2E_PASSWORD: e2e-password-CHANGE-ME

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
