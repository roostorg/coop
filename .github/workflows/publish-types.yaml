name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'types/**'
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC i.e. publish package
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check and publish types
        run: |
          cd types
          PKG_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking $PKG_NAME@$VERSION..."

          if pnpm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "⚠️  Version $VERSION of $PKG_NAME already exists on npm - skipping"
          else
            echo "✅ Publishing $PKG_NAME@$VERSION..."
            pnpm run build
            pnpm publish
          fi
