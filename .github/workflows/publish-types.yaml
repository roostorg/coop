name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'types/**'
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC i.e. publish package
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and publish types
        run: |
          cd types
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking @roostorg/types@$VERSION..."

          if pnpm view "@roostorg/types@$VERSION" version >/dev/null 2>&1; then
            echo "⚠️  Version $VERSION of @roostorg/types already exists on npm - skipping"
          else
            echo "✅ Publishing @roostorg/types@$VERSION..."
            pnpm run build
            pnpm publish
          fi
