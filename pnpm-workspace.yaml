packages:
  - client
  - server
  - types
  - db
  - migrator
  - nodejs-instrumentation

overrides:
  # Force all packages (including transitive deps like @node-saml/passport-saml)
  # to use @types/express v5. Mirrors the override in server/package.json that
  # worked under npm but is ignored by pnpm (pnpm only reads root overrides).
  "@types/express": "^5"
  # v6 fixes the interface Matchers<R, T = {}> incompatibility with @types/jest@30.
  # v5 used Matchers<R> (one param) which doesn't merge with jest@30's two-param
  # signature. v6 is already in the pnpm store (pulled by storybook@9).
  "@testing-library/jest-dom": "^6"

# clone-or-copy: use copy-on-write cloning from the pnpm store (fastest on APFS/macOS),
# fall back to copying on Linux CI where CoW may not be available.
# Avoids hardlinks, which can cause confusing behaviour when editing node_modules locally.
packageImportMethod: clone-or-copy

# Resolve @roostorg/types from the local workspace rather than the npm registry,
# even if a newer published version exists. Without this, a stale published version
# could be silently resolved instead of local changes.
preferWorkspacePackages: true

ignoredBuiltDependencies:
  - '@apollo/protobufjs'
  - '@parcel/watcher'
  - core-js
  - core-js-pure
  - esbuild
  - msgpackr-extract
  - nice-napi
  - protobufjs
  - unrs-resolver

onlyBuiltDependencies:
  - '@mongodb-js/zstd'

# Refuse to install packages published less than 7 days ago (10080 minutes).
# Mitigates "publish-and-immediately-compromise" supply chain attacks.
minimumReleaseAge: 10080

# First-party roostorg packages are exempt: they're published from this repo and
# trusted by definition; the age gate adds no supply-chain protection for them.
minimumReleaseAgeExclude:
  - '@roostorg/coop-types'

# Block transitive dependencies from resolving via git repos or tarball URLs.
# Ensures all deps come from the official registry, not arbitrary remote sources.
blockExoticSubdeps: true

allowBuilds:
  '@apollo/protobufjs': false
  '@parcel/watcher': false
  core-js-pure: false
  esbuild: false
  msgpackr-extract: false
  nice-napi: false
  protobufjs: false
  unrs-resolver: false
