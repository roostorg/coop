# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for Coop. Schema:
# https://docs.coderabbit.ai/reference/configuration
#
# Review guidance lives in `.github/copilot-instructions.md` and `AGENTS.md`.
# CodeRabbit's Code Guidelines feature picks both files up automatically (their
# default `knowledge_base.code_guidelines.file_patterns` includes
# `.github/copilot-instructions.md` and `**/AGENTS.md`), so we do not duplicate
# the prose here. Update the markdown files; CodeRabbit will follow.
#
# This file only carries settings that cannot be expressed in markdown:
# review profile, auto-review behavior, path filters, and which of CodeRabbit's
# bundled tools we want enabled.

language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Skip generated artifacts, lockfiles, and vendored content. These are either
  # codegen output (`npm run generate`) or not human-authored.
  path_filters:
    - '!**/generated.ts'
    - '!**/package-lock.json'
    - '!**/node_modules/**'
    - '!**/dist/**'
    - '!**/build/**'
    - '!**/*.snap'

  # ESLint and Prettier already run in CI (see AGENTS.md > "CI"). Disable the
  # bundled formatters/linters so CodeRabbit does not duplicate that output.
  # Keep security-oriented tools (secret scanning, SAST, IaC) enabled.
  tools:
    eslint:
      enabled: false
    biome:
      enabled: false
    prettier:
      enabled: false
    markdownlint:
      enabled: false
    oxc:
      enabled: false
    yamllint:
      enabled: false
    hadolint:
      enabled: false
    shellcheck:
      enabled: false
    languagetool:
      enabled: false
    ast-grep:
      enabled: false
    gitleaks:
      enabled: true
    semgrep:
      enabled: true
    checkov:
      enabled: true

knowledge_base:
  # Code Guidelines is on by default; stated explicitly so a future reader sees
  # that the substantive review rules come from the markdown files above.
  code_guidelines:
    enabled: true
