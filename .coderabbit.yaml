# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Review rules live in `.github/copilot-instructions.md` and `AGENTS.md` —
# CodeRabbit picks both up automatically. This file only carries settings that
# differ from CodeRabbit's defaults.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    labels:
      - '!dependabot'
  path_filters:
    - '!**/generated.ts'
    - '!**/package-lock.json'
    - '!**/node_modules/**'
    - '!**/dist/**'
    - '!**/build/**'
    - '!**/*.snap'

  # Lint runs in CI; disable CodeRabbit's bundled linters to avoid duplicates.
  tools:
    eslint:
      enabled: false
    biome:
      enabled: false
    markdownlint:
      enabled: false
    oxc:
      enabled: false
    yamllint:
      enabled: false
    hadolint:
      enabled: false
    shellcheck:
      enabled: false
    languagetool:
      enabled: false
